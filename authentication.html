<!DOCTYPE html>
<html>
<head>
    <title>CNT 4714 Project 4 Authentication</title>
    <link rel="stylesheet" href="project4.css">
</head>

<body>

<h1 class="main-title-yellow">
    Welcome to the Spring 2026 Project 4 Enterprise System
</h1>

<h2 class="main-title-green">
    A Servlet/JSP-based Multi-tiered Enterprise Application Using A Tomcat Container
</h2>

<h2 class="red-heading">
    - User Authentication Page -
</h2>

<hr>

<div class="login-box">
    <form action="authenticate" method="post">
        <table class="login-table">
            <tr>
                <td class="yellow-label">UserName</td>
                <td>
                    <input type="text" name="username" autofocus>
                </td>
            </tr>

            <tr>
                <td class="yellow-label">Password</td>
                <td>
                    <input type="password" name="password">
                </td>
            </tr>

            <tr>
                <td colspan="2">
                    <input class="auth-button" type="submit" value="Click To Authenticate">
                </td>
            </tr>
        </table>
    </form>
</div>

<hr>

</body>
</html>
